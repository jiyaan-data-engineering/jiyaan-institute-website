<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Cloud Card Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f1f3f4;
            font-family: 'Inter', Arial, sans-serif;
            gap: 50px;
            padding: 40px;
        }

        .preview-label {
            font-size: 24px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            gap: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ORIGINAL STYLE (Before) */
        .UAquKe {
            width: 420px;
            background: #fff;
            border-radius: 28px;
            padding: 40px;
            box-shadow:
                0 10px 30px rgba(0,0,0,0.08),
                0 2px 8px rgba(0,0,0,0.05);
            transition: 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .UAquKe:hover {
            transform: translateY(-8px);
            box-shadow:
                0 20px 45px rgba(0,0,0,0.15),
                0 8px 20px rgba(0,0,0,0.08);
        }

        .XDSYge {
            width: 100%;
            display: block;
            border-radius: 20px;
            transition: 0.4s ease;
        }

        .UAquKe:hover .XDSYge {
            transform: scale(1.03);
        }

        .card-content {
            margin-top: 24px;
            text-align: center;
        }

        .card-title {
            font-size: 30px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 16px;
            color: #5f6368;
            line-height: 1.6;
        }

        /* NEW STYLE (After - with Premium Background) */
        .UAquKe.premium {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* Adding a subtle background pattern to the card */
        .UAquKe.premium::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(66, 133, 244, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(52, 168, 83, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(251, 188, 5, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(234, 67, 53, 0.03) 0%, transparent 20%);
            z-index: 0;
            pointer-events: none;
        }

        .UAquKe.premium .XDSYge, 
        .UAquKe.premium .card-content {
            position: relative;
            z-index: 1;
        }

        /* Refining the shadow for a more "floating" effect */
        .UAquKe.premium:hover {
            box-shadow: 
                0 30px 60px -12px rgba(50, 50, 93, 0.25), 
                0 18px 36px -18px rgba(0, 0, 0, 0.3);
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- BEFORE -->
        <div class="preview-section">
            <div class="preview-label">Before</div>
            <div class="UAquKe wVBou">
                <img 
                    class="XDSYge"
                    src="https://www.gstatic.com/bricks/image/720624ce-2196-48d4-9963-a31aa86bdfbc.webp"
                    alt="Google Cloud"
                >
                <div class="card-content">
                    <div class="card-title">Google Cloud</div>
                    <div class="card-desc">
                        Classic style with solid white background and standard shadow.
                    </div>
                </div>
            </div>
        </div>

        <!-- AFTER -->
        <div class="preview-section">
            <div class="preview-label">After</div>
            <div class="UAquKe wVBou premium">
                <img 
                    class="XDSYge"
                    src="https://www.gstatic.com/bricks/image/720624ce-2196-48d4-9963-a31aa86bdfbc.webp"
                    alt="Google Cloud"
                >
                <div class="card-content">
                    <div class="card-title">Google Cloud</div>
                    <div class="card-desc">
                        Premium style with subtle gradient background and multi-layered glow shadows.
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
